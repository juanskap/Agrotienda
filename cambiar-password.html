<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambiar Contraseña | Agrotienda</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    :root { --bg:#f5f0e4; --card:#fffdf7; --surface:#edf2e6; --border:#d8dfcf; --text:#243124; --muted:#667261; --primary:#bf6f2f; --secondary:#6d8a34; --shadow:0 20px 44px rgba(95,76,42,.12); }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px; font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif; background:radial-gradient(circle at top left, rgba(191,111,47,.14), transparent 28%), radial-gradient(circle at right center, rgba(109,138,52,.16), transparent 30%), var(--bg); color:var(--text); }
    a { color:inherit; text-decoration:none; }
    .card { width:min(760px, 100%); background:var(--card); border:1px solid var(--border); border-radius:28px; box-shadow:var(--shadow); padding:32px; display:grid; gap:18px; }
    h1 { margin:0; font-size:2rem; }
    p { margin:0; color:var(--muted); line-height:1.6; }
    form { display:grid; gap:14px; }
    label { font-weight:700; }
    input { width:100%; padding:14px 16px; border-radius:14px; border:1px solid var(--border); background:#f7f2e8; color:var(--text); font:inherit; }
    .helper { padding:16px; border-radius:18px; background:var(--surface); border:1px solid var(--border); }
    .btn-row { display:flex; gap:10px; flex-wrap:wrap; }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:12px 18px; border-radius:999px; border:1px solid var(--border); background:var(--surface); color:var(--text); font:inherit; font-weight:800; }
    .btn.primary { background:linear-gradient(135deg, var(--primary), #f2b15a); color:white; border-color:transparent; }
    @media (max-width:560px) { body { padding:12px; } .card { padding:22px 18px; } }
  </style>
</head>
<body>
  <main class="card">
    <h1>Cambiar contrasena</h1>
    <p>Esta pantalla complementa la recuperacion de acceso. Aqui el cliente actualiza su clave desde su propia cuenta.</p>
    <form>
      <div><label for="actual">Contrasena actual</label><input id="actual" type="password" placeholder="Ingresa tu contrasena actual"></div>
      <div><label for="nueva">Nueva contrasena</label><input id="nueva" type="password" placeholder="Crea una nueva contrasena"></div>
      <div><label for="confirmar">Confirmar nueva contrasena</label><input id="confirmar" type="password" placeholder="Repite la nueva contrasena"></div>
      <button class="btn primary" type="submit">&#128274; Actualizar contrasena</button>
    </form>
    <div class="helper"><p>Cuando conectemos backend, aqui validaremos la clave actual, reglas de seguridad y confirmacion del cambio.</p></div>
    <div class="btn-row"><a class="btn" href="mi-cuenta.html">&#8592; Volver a mi cuenta</a><a class="btn" href="recuperar-password.html">&#128273; Recuperar acceso</a></div>
  </main>
</body>
</html>
