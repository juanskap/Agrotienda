<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Direcciones | Agrotienda</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    :root { --bg:#f5f0e4; --surface:#fffdf7; --surface-soft:#edf2e6; --surface-muted:#e5eddd; --border:#d8dfcf; --text:#243124; --muted:#667261; --primary:#bf6f2f; --secondary:#6d8a34; --shadow:0 18px 34px rgba(95,76,42,.12); }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif; background:radial-gradient(circle at top left, rgba(191,111,47,.12), transparent 28%), radial-gradient(circle at right center, rgba(109,138,52,.12), transparent 30%), var(--bg); color:var(--text); }
    a { color:inherit; text-decoration:none; }
    .page { width:min(1260px, calc(100% - 34px)); margin:22px auto; display:grid; gap:18px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:24px; box-shadow:var(--shadow); padding:24px; }
    .top { display:flex; justify-content:space-between; align-items:center; gap:14px; flex-wrap:wrap; }
    .brand h1 { margin:0; font-size:1.9rem; } .brand span { color:var(--primary); } .brand p { margin:6px 0 0; color:var(--muted); }
    .links { display:flex; gap:10px; flex-wrap:wrap; }
    .chip, .btn { padding:10px 14px; border-radius:999px; background:var(--surface-muted); border:1px solid var(--border); font-weight:700; }
    .layout { display:grid; grid-template-columns:.95fr 1.05fr; gap:18px; }
    .list, form { display:grid; gap:14px; }
    .address, .form-card { padding:18px; border-radius:22px; border:1px solid var(--border); background:linear-gradient(180deg, #fffdf8, #f4ede0); }
    .address h3, .form-card h3 { margin:0 0 8px; }
    .muted { color:var(--muted); line-height:1.6; margin:0; }
    .field { display:grid; gap:8px; }
    input, textarea { width:100%; padding:13px 14px; border-radius:14px; border:1px solid var(--border); background:var(--surface-soft); color:var(--text); font:inherit; }
    textarea { min-height:100px; resize:vertical; }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; font:inherit; color:var(--text); }
    .btn.primary { background:linear-gradient(135deg, var(--primary), #f2b15a); color:white; border-color:transparent; }
    @media (max-width:980px) { .layout { grid-template-columns:1fr; } }
    @media (max-width:760px) { .page { width:min(100% - 18px, 100%); margin:10px auto; } }
  </style>
</head>
<body>
  <main class="page">
    <section class="card top">
      <div class="brand"><h1>Agro<span>Tienda</span></h1><p>Gestion de direcciones de envio para pedidos actuales y futuros</p></div>
      <div class="links"><a class="chip" href="mi-cuenta.html">&#8592; Mi cuenta</a><a class="chip" href="checkout.html">&#9989; Checkout</a></div>
    </section>
    <section class="layout">
      <article class="list">
        <div class="address"><h3>Direccion principal</h3><p class="muted">Av. Principal y calle 10, Quito. Referencia: frente al vivero.</p></div>
        <div class="address"><h3>Direccion secundaria</h3><p class="muted">Bodega norte, sector industrial, Guayaquil. Solo para pedidos mayoristas.</p></div>
      </article>
      <section class="form-card">
        <h3>Nueva direccion</h3>
        <form>
          <div class="field"><label for="alias">Alias</label><input id="alias" type="text" placeholder="Casa, finca, bodega..."></div>
          <div class="field"><label for="direccion">Direccion</label><input id="direccion" type="text" placeholder="Calle principal y numero"></div>
          <div class="field"><label for="referencia">Referencia</label><textarea id="referencia" placeholder="Indicaciones extra para la entrega"></textarea></div>
          <button class="btn primary" type="submit">&#10004; Guardar direccion</button>
        </form>
      </section>
    </section>
  </main>
</body>
</html>
