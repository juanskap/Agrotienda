<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil | Agrotienda</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    :root { --bg:#f5f0e4; --surface:#fffdf7; --surface-soft:#edf2e6; --surface-muted:#e5eddd; --border:#d8dfcf; --text:#243124; --muted:#667261; --primary:#bf6f2f; --secondary:#6d8a34; --shadow:0 18px 34px rgba(95,76,42,.12); }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif; background:radial-gradient(circle at top left, rgba(191,111,47,.12), transparent 28%), radial-gradient(circle at right center, rgba(109,138,52,.12), transparent 30%), var(--bg); color:var(--text); }
    a { color:inherit; text-decoration:none; }
    .page { width:min(1080px, calc(100% - 34px)); margin:22px auto; display:grid; gap:18px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:24px; box-shadow:var(--shadow); padding:24px; }
    .top { display:flex; justify-content:space-between; align-items:center; gap:14px; flex-wrap:wrap; }
    .brand h1 { margin:0; font-size:1.9rem; } .brand span { color:var(--primary); } .brand p { margin:6px 0 0; color:var(--muted); }
    .links { display:flex; gap:10px; flex-wrap:wrap; }
    .chip, .btn { padding:10px 14px; border-radius:999px; background:var(--surface-muted); border:1px solid var(--border); font-weight:700; }
    .hero { background:radial-gradient(circle at right, rgba(255,255,255,.48), transparent 36%), linear-gradient(135deg, #f6f0e2, #e7eedb); display:grid; gap:10px; }
    .hero h2 { margin:0; }
    .muted { color:var(--muted); line-height:1.6; margin:0; }
    form { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:16px; }
    .field { display:grid; gap:8px; }
    .full { grid-column:1 / -1; }
    input, textarea { width:100%; padding:13px 14px; border-radius:14px; border:1px solid var(--border); background:var(--surface-soft); color:var(--text); font:inherit; }
    textarea { min-height:100px; resize:vertical; }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; font:inherit; color:var(--text); }
    .btn.primary { background:linear-gradient(135deg, var(--primary), #f2b15a); color:white; border-color:transparent; }
    @media (max-width:760px) { .page { width:min(100% - 18px, 100%); margin:10px auto; } form { grid-template-columns:1fr; } .full { grid-column:auto; } }
  </style>
</head>
<body>
  <main class="page">
    <section class="card top">
      <div class="brand"><h1>Agro<span>Tienda</span></h1><p>Datos personales, contacto y configuracion basica del cliente</p></div>
      <div class="links"><a class="chip" href="mi-cuenta.html">&#8592; Mi cuenta</a><a class="chip" href="mis-pedidos.html">&#128230; Mis pedidos</a></div>
    </section>
    <section class="card hero"><h2>Mi perfil</h2><p class="muted">Aqui el cliente podra editar su informacion, telefono, correo y notas para entrega o facturacion.</p></section>
    <section class="card">
      <form>
        <div class="field"><label for="nombre">Nombre</label><input id="nombre" type="text" value="Juan"></div>
        <div class="field"><label for="apellido">Apellido</label><input id="apellido" type="text" value="Carrillo"></div>
        <div class="field"><label for="correo">Correo</label><input id="correo" type="email" value="juan@correo.com"></div>
        <div class="field"><label for="telefono">Telefono</label><input id="telefono" type="tel" value="0999999999"></div>
        <div class="field full"><label for="nota">Nota del cliente</label><textarea id="nota">Prefiero confirmacion por WhatsApp antes del despacho.</textarea></div>
        <div class="field full"><button class="btn primary" type="submit">&#10004; Guardar cambios</button></div>
      </form>
    </section>
  </main>
</body>
</html>
